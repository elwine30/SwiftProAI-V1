<div [@routerTransition]>
    <sub-header
        [title]="('Branches' | localize) + ' ' + ('Details' | localize)"
        [breadcrumbs]="breadcrumbs"
    ></sub-header>

    <div [class]="containerClass">
        <div class="card card-custom gutter-b">
            <div class="card-body">
                <div class="form-group">
                    <label for="Branch_Name">{{ l('Name') }}</label>
                    <input
                        type="text"
                        #Branch_Name="ngModel"
                        id="Branch_Name"
                        class="form-control"
                        [(ngModel)]="branch.name"
                        name="Name"
                    />
                    <validation-messages [formCtrl]="Branch_Name"></validation-messages>
                </div>

                <div class="form-group">
                    <label for="Branch_ShortName">{{ l('ShortName') }}</label>
                    <input
                        type="text"
                        #Branch_ShortName="ngModel"
                        id="Branch_ShortName"
                        class="form-control"
                        [(ngModel)]="branch.shortName"
                        name="ShortName"
                    />
                    <validation-messages [formCtrl]="Branch_ShortName"></validation-messages>
                </div>
            </div>
            <div class="card-footer">
                <div class="col-lg-12">
                    <button
                        (click)="save()"
                        class="btn btn-primary blue float-right"
                        [buttonBusy]="saving"
                        [busyText]="l('SavingWithThreeDot')"
                    >
                        <i class="fa fa-save"></i>
                        <span>{{ l('Save') }}</span>
                    </button>
                    <button
                        *ngIf="!this.branch.id"
                        (click)="saveAndNew()"
                        class="btn btn-primary blue float-right"
                        [buttonBusy]="saving"
                        [busyText]="l('SavingWithThreeDot')"
                    >
                        <i class="fa fa-save"></i>
                        <span>{{ l('SaveAndNew') }}</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
