<div
    bsModal
    #createOrEditModal="bs-modal"
    class="modal fade"
    tabindex="-1"
    role="dialog"
    aria-labelledby="createOrEditModal"
    aria-hidden="true"
    [config]="{ backdrop: 'static' }"
>
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">
                    <span>{{ l('Upload Files') }}</span>
                </h4>

                <button
                    type="button"
                    class="btn-close"
                    (click)="close()"
                    aria-label="Close"
                    [disabled]="saving"
                ></button>
            </div>

            <div class="modal-body">
                <div class="form-group row">
                    <div class="my-3">
                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label">{{ l('ReportFileUpload') }} *</label>
                                <div class="input-group mb-3">
                                    <span
                                        class="input-group-text"
                                        id="inputGroupFileAddon01"
                                        style="margin-right: 20px"
                                    >
                                        <div class="custom-file">
                                            <input
                                                type="file"
                                                class="custom-file-input"
                                                id="CasePoliceReport_ReportFileUpload"
                                                name="CasePoliceReport_ReportFileUpload"
                                                aria-describedby="inputGroupFileAddon01"
                                                (change)="onSelectReportFileUploadFile($event)"
                                                [accept]="reportFileUploadFileAcceptedTypes"
                                            />
                                            <!-- <label class="custom-file-label" #CaseIncidentDetail_CircumstancesFileUploadLabel for="CaseIncidentDetail_CircumstancesFileUpload">{{ l('ChooseAFile') }}</label> -->
                                        </div>
                                        <div
                                            *ngIf="
                                                reportFileUploadFileName != null || reportFileUploadFileUploaded == true
                                            "
                                        >
                                            <i class="fa fa-check-circle text-success" style="font-size: 15px"></i>
                                        </div>
                                    </span>
                                </div>

                                <div
                                    *ngIf="reportFileUploadFileName"
                                    style="background-color: #e5e5e5; margin-right: 20px"
                                >
                                    <div class="alert alert-custom alert-white alert-bold m-1" role="alert">
                                        <span class="font-weight-bold">{{ 'CurrentFile' | localize }} :</span>

                                        <a
                                            href="{{ getDownloadUrl(casePoliceReport.reportFileUpload) }}"
                                            target="_blank"
                                        >
                                            {{ reportFileUploadFileName }}
                                        </a>

                                        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                            <span aria-hidden="true" (click)="removeReportFileUploadFile()">
                                                <i class="la la-close fa-1x"></i>
                                            </span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 mb-3">
                        <div class="alert alert-warning" role="alert">
                            <h5 class="alert-heading">
                                <b>NOTE:</b>
                                {{ l('OCRDisclaimer') }}
                            </h5>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button
                    (click)="close()"
                    class="btn btn-light-primary fw-bold text-right"
                    [buttonBusy]="saving"
                    [busyText]="l('SavingWithThreeDot')"
                >
                    <span>{{ l('Back') }}</span>
                </button>
            </div>
        </div>
    </div>
</div>
