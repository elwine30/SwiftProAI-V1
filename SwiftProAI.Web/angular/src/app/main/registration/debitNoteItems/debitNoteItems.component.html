<div class="row align-items-center">
    <!--<Primeng-Datatable-Start>-->

        <p-table #dataTable
                        (onLazyLoad)="getDebitNoteItems($event)"
                        [value]="primengTableHelper.records"
                        rows="{{primengTableHelper.defaultRecordsCountPerPage}}"
                        [paginator]="false"
                        [lazy]="true"
                        [scrollable]="true"
                        ScrollWidth="100%"
                        [tableStyle]="{'min-width': '50rem'}"
                        [resizableColumns]="primengTableHelper.resizableColumns">
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 150px" pSortableColumn="remark">
                        {{l('Remark')}}
                        <p-sortIcon field="debitNoteItem.remark"></p-sortIcon>
                    </th>
                    <th style="width: 150px" pSortableColumn="amount">
                        {{l('Amount')}}
                        <p-sortIcon field="debitNoteItem.amount"></p-sortIcon>
                    </th>
                    <th style="width: 100px" [hidden]="!isGrantedAny('Pages.DebitNoteItems.Edit', 'Pages.DebitNoteItems.Delete')">{{l('Actions')}}</th>

                </tr>
            </ng-template>                           
            <ng-template pTemplate="body" let-record="$implicit" let-i="rowIndex">
                <tr>
                    <td style="width:100px">
                            <span class="p-column-title"> {{l('Remark')}}</span>
                            {{record.debitNoteItem.remark}}
                        </td>
                    <td style="width:50px">
                            <span class="p-column-title"> {{l('Amount')}}</span>
                            {{record.debitNoteItem.amount | number:'1.2-2'}}
                        </td>

                    <td style="width: 50px" [hidden]="!isGrantedAny('Pages.DebitNoteItems.Edit', 'Pages.DebitNoteItems.Delete')">
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-sm btn-link" *ngIf="permission.isGranted('Pages.DebitNoteItems.Edit')" (click)="createOrEditDebitNoteItemModal.show(null,record.debitNoteItem.id)">
                                <i class="fa fa-pencil-alt" style = "margin-right: 20px;"></i>
                            </button>
                            <button type="button" class="btn btn-sm btn-link" *ngIf="permission.isGranted('Pages.DebitNoteItems.Delete')" (click)="deleteDebitNoteItem(record.debitNoteItem)">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                
            </ng-template>
        </p-table>
        <div class="primeng-no-data" *ngIf="primengTableHelper.totalRecordsCount == 0">
            {{l('NoData')}}
        </div>
        <div class="primeng-paging-container" hidden>
            <p-paginator [rows]="primengTableHelper.defaultRecordsCountPerPage"
                            #paginator
                            (onPageChange)="getDebitNoteItems($event)"
                            [totalRecords]="primengTableHelper.totalRecordsCount"
                            [rowsPerPageOptions]="primengTableHelper.predefinedRecordsCountPerPage"
                            [showCurrentPageReport]="true"
                            [currentPageReportTemplate]="'TotalRecordsCount' | localize:primengTableHelper.totalRecordsCount"    
            >
            </p-paginator>
        </div>

    <!--<Primeng-Datatable-End>-->
</div>

<createOrEditDebitNoteItemModal #createOrEditDebitNoteItemModal (modalSave)="emitTableChange()"></createOrEditDebitNoteItemModal>
