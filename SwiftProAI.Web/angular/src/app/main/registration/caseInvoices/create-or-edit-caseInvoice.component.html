<div [@routerTransition]>
    <div [@routerTransition]>
        <div [@routerTransition]>
            <div [@routerTransition]>
                <div [class]="containerClass">
                    <div class="card card-custom gutter-b">
                        <sub-header [title]="'InvoiceGenerator' | localize"></sub-header>

                        <div class="card-body">
                            <div class="row mb-2">
                                <div class="col-xl-12 text-center">
                                    <h1>{{ tenantCompanyName }}</h1>
                                </div>
                                <!-- <div class="col-md-6 text-md-right">
						<h3>(Company No: {{ companyNumber }})</h3>
					</div> -->
                            </div>

                            <div class="row mb-5">
                                <!-- <div class="col-xl-12">
						<p>File Reference: {{ fileReference }}</p>
					</div> -->
                                <!-- <div class="col-xl-12 text-center">
                                    <h3>Date: &lt;{{ l('InvoiceGeneratedDate') }}&gt;</h3>
                                </div> -->
                            </div>
                        </div>

                        <div class="card-body">
                            <form #caseInvoiceForm="ngForm">
                                <div class="row mb-2">
                                    <div class="col-xl-12">
                                        <h5>
                                            {{ l('ExpenseRecordDependencyInfo') }}
                                            {{ l('ExpenseRecordDependencyInfo2') }}
                                        </h5>
                                    </div>
                                </div>

                                <div class="row mb-5">
                                    <div class="col-xl-12">
                                        <div class="form-check">
                                            <input
                                                class="form-check-input"
                                                type="checkbox"
                                                id="expenseRecordCheckbox"
                                                [(ngModel)]="acknowledgeDependency"
                                            />
                                            <label class="form-check-label" for="expenseRecordCheckbox">
                                                {{ l('ExpenseRecordDependencyCheckbox') }}
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group row">
                                    <div class="col-xl-6">
                                        <h5 class="card-title bg-light p-2 text-center">{{ l('Item') }}</h5>
                                    </div>
                                    <div class="col-xl-2">
                                        <h5 class="card-title bg-light p-2 text-center">{{ l('ClaimsAmount') }}</h5>
                                    </div>
                                    <div class="col-xl-2">
                                        <h5 class="card-title bg-light p-2 text-center">{{ l('Amount') }}</h5>
                                    </div>
                                    <div class="col-xl-2">
                                        <h5 class="card-title bg-light p-2 text-center">{{ l('SST') }}</h5>
                                    </div>
                                </div>

                                <div class="form-group row align-items-center">
                                    <div class="col-xl-1 mb-1">
                                        <label class="form-label" for="CaseInvoice_Police">{{ l('Police') }}</label>
                                    </div>
                                    <div class="col-xl-5 mb-5"></div>
                                    <div class="col-xl-2 mb-2">
                                        <input
                                            type="number"
                                            #CaseClaim_Police="ngModel"
                                            id="CaseClaim_Police"
                                            class="form-control"
                                            [ngModel]="formatNumber(caseClaim.police)"
                                            (ngModelChange)="caseClaim.police = $event"
                                            name="Police"
                                            min="0.00"
                                            step="0.01"
                                            pattern="^\d+(\.\d{1,2})?$"
                                            style="text-align: right"
                                            disabled
                                        />
                                        <validation-messages [formCtrl]="CaseClaim_Police"></validation-messages>
                                    </div>
                                    <div class="col-xl-2 mb-2">
                                        <input
                                            type="number"
                                            #CaseInvoice_PoliceAmount="ngModel"
                                            id="CaseInvoice_PoliceAmount"
                                            class="form-control"
                                            [(ngModel)]="caseInvoice.policeAmount"
                                            name="PoliceAmount"
                                            (change)="onItemAmountChange({ amount: 'policeAmount', sst: 'policeSST' })"
                                            style="text-align: right"
                                            step="0.01"
                                            amount
                                            decimal
                                        />
                                        <validation-messages
                                            [formCtrl]="CaseInvoice_PoliceAmount"
                                        ></validation-messages>
                                    </div>
                                    <div class="col-xl-2 mb-2 d-flex align-items-center">
                                        <div class="col-10 pe-0">
                                            <input
                                                type="number"
                                                #CaseInvoice_PoliceSST="ngModel"
                                                id="CaseInvoice_PoliceSST"
                                                class="form-control"
                                                [ngModel]="formatNumber(caseInvoice.policeSST)"
                                                name="PoliceSST"
                                                step="0.01"
                                                style="text-align: right"
                                                disabled
                                            />
                                            <validation-messages
                                                [formCtrl]="CaseInvoice_PoliceSST"
                                            ></validation-messages>
                                        </div>
                                        <div class="col-2 d-flex align-items-center px-2">
                                            <input
                                                type="checkbox"
                                                [(ngModel)]="sstCheckboxStates['policeSST']"
                                                (ngModelChange)="
                                                    onItemAmountChange({ amount: 'policeAmount', sst: 'policeSST' })
                                                "
                                                [checked]="sstCheckboxStates['policeSST']"
                                                style="margin-right: 3px"
                                            />
                                        </div>
                                    </div>
                                </div>
                                <hr />

                                                style="margin-right: 3px"
                                            />
                                        </div>
                                    </div>
                                </div>
