<div [@routerTransition]>
    <div [class]="containerClass">
        <div class="card card-custom gutter-b">
            <sub-header [title]="'CreditNoteGenerator' | localize"></sub-header>
            <form #caseCreditNoteForm="ngForm">
                <div class="card-body">
                    <div class="row mb-2">
                        <div class="col-xl-12 text-center">
                            <h2>{{ tenantCompanyName }}</h2>
                        </div>
                        <!-- <div class="col-md-6 text-md-right">
						  <h3>(Company No: {{ companyNumber }})</h3>
					  </div> -->
                    </div>

                    <div class="row mb-5">
                        <!-- <div class="col-xl-12">
						  <p>File Reference: {{ fileReference }}</p>
					  </div> -->
                        <!-- <div class="col-xl-12 text-center">
						<h4>Date: &lt;{{l("CreditNoteGeneratedDate")}}&gt; </h4>
					</div> -->
                    </div>
                </div>

                <div class="card-body">
                    <div class="form-group row">
                        <div class="col-xl-6">
                            <h5 class="card-title bg-light p-2 text-center">{{ l('Item') }}</h5>
                        </div>
                        <div class="col-xl-2">
                            <h5 class="card-title bg-light p-2 text-center">{{ l('Amount') }}</h5>
                        </div>
                        <div class="col-xl-2">
                            <h5 class="card-title bg-light p-2 text-center">{{ l('SST') }}</h5>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-5 mb-5"></div>

                        <div class="col-xl-1"></div>

                        <div class="col-xl-2 mb-5"></div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-5 mb-5">
                            <label class="form-label" for="CaseCreditNote_ServiceRemark">{{ l('Service') }}</label>
                            <input
                                type="text"
                                #CaseCreditNote_ServiceRemark="ngModel"
                                id="CaseCreditNote_ServiceRemark"
                                class="form-control"
                                [(ngModel)]="caseCreditNote.serviceRemark"
                                name="ServiceRemark"
                                minlength="1"
                                maxlength="100"
                                placeholder="Type a Remark"
                            />
                            <validation-messages [formCtrl]="CaseCreditNote_ServiceRemark"></validation-messages>
                        </div>

                        <div class="col-xl-1"></div>

                        <div class="col-xl-2 mb-5">
                            <label class="form-label" for="CaseCreditNote_ServiceAmount">
                                {{ l('ServiceAmount') }}
                            </label>
                            <input
                                type="number"
                                #CaseCreditNote_ServiceAmount="ngModel"
                                id="CaseCreditNote_ServiceAmount"
                                class="form-control"
                                [(ngModel)]="caseCreditNote.serviceAmount"
                                name="ServiceAmount"
                                (change)="onItemAmountChange({ amount: 'serviceAmount', sst: 'serviceSST' })"
                                style="text-align: right"
                                step="0.01"
                                amount
                                decimal
                            />
                            <validation-messages [formCtrl]="CaseCreditNote_ServiceAmount"></validation-messages>
                        </div>

                        <div class="col-xl-2 mb-5">
                            <div class="col-xl-12 d-flex justify-content-between">
                                <label class="form-label" for="CaseCreditNote_ServiceSST">{{ l('ServiceSST') }}</label>
                                <input
                                    type="checkbox"
                                    [(ngModel)]="sstCheckboxStates['serviceSST']"
                                    (ngModelChange)="onItemAmountChange({ amount: 'serviceAmount', sst: 'serviceSST' })"
                                    [checked]="sstCheckboxStates['serviceSST']"
                                    style="margin-right: 3px"
                                />
                            </div>
                            <input
                                type="number"
                                #CaseCreditNote_ServiceSST="ngModel"
                                id="CaseCreditNote_ServiceSST"
                                class="form-control"
                                [ngModel]="formatNumber(caseCreditNote.serviceSST)"
                                name="ServiceSST"
                                step="0.01"
                                style="text-align: right"
                                disabled
                            />
                            <validation-messages [formCtrl]="CaseCreditNote_ServiceSST"></validation-messages>
                        </div>
                    </div>

                                    [(ngModel)]="sstCheckboxStates['miscSST']"
                                    (ngModelChange)="onItemAmountChange({ amount: 'miscAmount', sst: 'miscSST' })"
                                    [checked]="sstCheckboxStates['miscSST']"
                                    style="margin-right: 3px"
                                />
                            </div>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-6 mb-5">
                            <creditNoteItemsTable
                                #creditNoteItemsTableMiscellaneous
                                [itemType]="'Miscellaneous'"
                                (tableChange)="updateCreditNoteItemTotal()"
                            ></creditNoteItemsTable>
                        </div>

                        <div class="col-xl-2 mb-5">
                            <input
                                type="number"
                                #CaseCreditNote_MiscAmount="ngModel"
                                id="CaseCreditNote_MiscAmount"
                                class="form-control"
                                [ngModel]="formatNumber(caseCreditNote.miscAmount)"
                                name="MiscAmount"
                                (change)="onItemAmountChange({ amount: 'miscAmount', sst: 'miscSST' })"
                                style="text-align: right"
                                step="0.01"
                                amount
                                disabled
                            />
                            <validation-messages [formCtrl]="CaseCreditNote_MiscAmount"></validation-messages>
                        </div>

                        <div class="col-xl-2 mb-5">
                            <input
                                type="number"
                                #CaseCreditNote_MiscSST="ngModel"
                                id="CaseCreditNote_MiscSST"
                                class="form-control"
                                [ngModel]="formatNumber(caseCreditNote.miscSST)"
                                name="MiscSST"
                                pattern="0.01"
                                disabled
                                style="text-align: right"
                            />
                            <validation-messages [formCtrl]="CaseCreditNote_MiscSST"></validation-messages>
                        </div>
                    </div>
                </div>

                <div class="form-group"></div>

                <div class="my-3"></div>

                <div class="card-footer">
                    <div class="form-group row">
                        <div class="col-xl-5 mb-5">
                            <label class="form-label">{{ l('Subtotal:') }}</label>
                        </div>

                        <div class="col-xl-1"></div>

                        <div class="col-xl-2 mb-5">
                            <label class="form-label" for="CaseCreditNote_AmountExcludeSST">
                                {{ l('AmountExcludeSST') }}
                            </label>
                            <input
                                type="number"
                                #CaseCreditNote_AmountExcludeSST="ngModel"
                                id="CaseCreditNote_AmountExcludeSST"
                                class="form-control"
                                [ngModel]="formatNumber(caseCreditNote.amountExcludeSST)"
                                name="AmountExcludeSST"
                                style="text-align: right"
                                step="0.01"
                                readonly
                            />
                            <validation-messages [formCtrl]="CaseCreditNote_AmountExcludeSST"></validation-messages>
                        </div>

                        <div class="col-xl-2 mb-5">
                            <label class="form-label" for="sstAmount">{{ l('SSTAmount') }}</label>
                            <input
                                type="number"
                                #SstAmount="ngModel"
                                id="SstAmount"
                                class="form-control"
                                [ngModel]="formatNumber(this.sstAmount)"
                                name="sstAmount"
                                style="text-align: right"
                                step="0.01"
                                readonly
                            />
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-5 mb-5">
                            <label class="form-label" for="SstAmount">{{ l('IncludeSSTRateAmount') }}</label>
                            <input
                                type="checkbox"
                                #CaseCreditNote_IncludeSST="ngModel"
                                id="CaseCreditNote_IncludeSST"
                                id="includeSST"
                                [(ngModel)]="caseCreditNote.includeSST"
                                (change)="toggleSST($event)"
                                checked
                                style="text-align: right; margin-left: 25px"
                            />
                        </div>

                        <div class="col-xl-1"></div>

                        <div class="col-xl-2 mb-5"></div>

                        <div class="col-xl-2 mb-5"></div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-5 mb-5">
                            <label class="form-label" for="CaseCreditNote_TotalInTextForm">
                                {{ l('TotalInTextForm') }}
                            </label>
                            <input
                                type="text-field"
                                #CaseCreditNote_TotalInTextForm="ngModel"
                                id="CaseCreditNote_TotalInTextForm"
                                class="form-control"
                                [(ngModel)]="caseCreditNote.totalInTextForm"
                                name="TotalInTextForm"
                                readonly
                            />
                            <validation-messages [formCtrl]="CaseCreditNote_TotalInTextForm"></validation-messages>
                        </div>

                        <div class="col-xl-1"></div>

                        <div class="col-xl-4 mb-5">
                            <label class="form-label" for="CaseCreditNote_TotalAmount">{{ l('TotalAmount') }}</label>
                            <div class="input-group">
                                <input
                                    type="number"
                                    #CaseCreditNote_TotalAmount="ngModel"
                                    id="CaseCreditNote_TotalAmount"
                                    class="form-control"
                                    [ngModel]="formatNumber(caseCreditNote.totalAmount)"
                                    name="TotalAmount"
                                    step="0.01"
                                    style="text-align: right"
                                    readonly
                                />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer">
                    <div class="form-group row">
                        <div class="col-xl-7 mb-5"></div>

                        <div class="col-xl-3 d-flex justify-content-end">
                            <button (click)="goBack()" class="btn btn-light-primary fw-bold flex-grow-1">
                                <span>{{ l('Back') }}</span>
                            </button>
                            <button
                                (click)="save()"
                                class="btn btn-primary blue float-right"
                                [buttonBusy]="saving"
                                [busyText]="l('SavingWithThreeDot')"
                            >
                                <i class="fa fa-save"></i>
                                <span>{{ l('Save') }}</span>
                            </button>
                            <button
                                (click)="preview()"
                                class="btn btn-success blue float-right flex-grow-1"
                                [buttonBusy]="saving"
                                [busyText]="l('SavingWithThreeDot')"
                            >
                                <i class="fa fa-paper-plane"></i>
                                <span>{{ l('Preview') }}</span>
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
