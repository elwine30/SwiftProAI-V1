<div class="row align-items-center">
    <!--<Primeng-Datatable-Start>-->

        <p-table #dataTable
                        (onLazyLoad)="getCaseSearchFees($event)"
                        [value]="primengTableHelper.records"
                        rows="{{primengTableHelper.defaultRecordsCountPerPage}}"
                        [paginator]="false"
                        [lazy]="true"
                        [scrollable]="true"
                        ScrollWidth="100%"
                        [tableStyle]="{'min-width': '50rem'}"
                        [resizableColumns]="primengTableHelper.resizableColumns">
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 100px" pSortableColumn="remark">
                        {{l('Remark')}}
                        <p-sortIcon field="caseSearchFee.remark"></p-sortIcon>
                    </th>
                    <th style="width: 50px" pSortableColumn="amount">
                        {{l('Amount')}}
                        <p-sortIcon field="caseSearchFee.amount"></p-sortIcon>
                    </th>
                    <th style="width: 100px" [hidden]="!isGrantedAny('Pages.CaseSearchFees.Edit', 'Pages.CaseSearchFees.Delete') || this.statusId != null">{{l('Actions')}}</th>

                </tr>
            </ng-template>                           
            <ng-template pTemplate="body" let-record="$implicit" let-i="rowIndex">
                <tr>
                    <td style="width:100px">
                            <span class="p-column-title"> {{l('Remark')}}</span>
                            {{record.caseSearchFee.remark}}
                        </td>
                    <td style="width:100px">
                            <span class="p-column-title"> {{l('Amount')}}</span>
                            {{record.caseSearchFee.amount | number: '1.2-2'}}
                        </td>
                        <td style="width: 50px" [hidden]="!isGrantedAny('Pages.CaseSearchFees.Edit', 'Pages.CaseSearchFees.Delete') || this.statusId != null">
                            <div class="btn-group" role="group">
                                <button type="button" class="btn btn-sm btn-link" *ngIf="permission.isGranted('Pages.CaseSearchFees.Edit')" (click)="createOrEditCaseSearchFeeModal.show(record.caseSearchFee.id)">
                                    <i class="fa fa-pencil-alt" style = "margin-right: 20px;"></i>
                                </button>
                                <button type="button" class="btn btn-sm btn-link" *ngIf="permission.isGranted('Pages.CaseSearchFees.Delete')" (click)="deleteCaseSearchFee(record.caseSearchFee)">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        </td>
                                                
                </tr>
                
            </ng-template>
        </p-table>
        <div class="primeng-no-data" *ngIf="primengTableHelper.totalRecordsCount == 0">
            {{l('NoData')}}
        </div>
        <div class="primeng-paging-container" hidden>
            <p-paginator [rows]="primengTableHelper.defaultRecordsCountPerPage"
                            #paginator
                            (onPageChange)="getCaseSearchFees($event)"
                            [totalRecords]="primengTableHelper.totalRecordsCount"
                            [rowsPerPageOptions]="primengTableHelper.predefinedRecordsCountPerPage"
                            [showCurrentPageReport]="true"
                            [currentPageReportTemplate]="'TotalRecordsCount' | localize:primengTableHelper.totalRecordsCount"    
            >
            </p-paginator>
        </div>

    <!--<Primeng-Datatable-End>-->
</div>

<createOrEditCaseSearchFeeModal #createOrEditCaseSearchFeeModal (modalSave)="emitTableChange()" ></createOrEditCaseSearchFeeModal>
