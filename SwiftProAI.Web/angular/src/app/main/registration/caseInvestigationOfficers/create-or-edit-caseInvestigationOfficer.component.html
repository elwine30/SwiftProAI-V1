<div [@routerTransition]>


	<!-- <sub-header [title]="('CaseInvestigationOfficers' | localize) +' '+ ('Details' | localize)">
            </sub-header> -->


	<div [class]="containerClass">
		<div class="card card-custom gutter-b">
			<sub-header [title]="('INVESTIGATION OFFICER' | localize) ">
			</sub-header>
			<div class="card-body">

				<div class="form-group row">
					<div class="col-xl-6 mb-5">
						<label class="form-label" for="CaseInvestigationOfficer_Name">{{l("Name")}}</label>
					</div>

					<div class="col-xl-6">
						<label class="form-label" for="CaseInvestigationOfficer_ContactNo">{{l("ContactNo")}}</label>
					</div>
				</div>


				<div class="form-group row">

					<div class="col-xl-6 mb-5">
						<label class="form-label" for="CaseInvestigationOfficer_ServiceNo">{{l("ServiceNo")}}</label>
					</div>

					<div class="col-xl-6 mb-5">
					</div>

				</div>

				<div class="col-lg-12" style="text-align: right;">
					<a [routerLink]="[navigationService.step5Url]" [queryParams]="{id: registerId, stepId: 5}"
						class="btn btn-primary green float-right"><i class=" fa fa-arrow-left"></i>
						<span>{{l("Back")}}</span>
					</a>
					<button (click)="save()" class="btn btn-primary blue float-right" [buttonBusy]="saving"
						[busyText]="l('SavingWithThreeDot')"><i class="fa fa-save"></i>
						<span>{{l("Save")}}</span>
					</button>
					<a [routerLink]="[navigationService.step7Url]" [queryParams]="{id: registerId, stepId: 7}"
						class="btn btn-primary green float-right"><i class=" fa fa-arrow-right"></i>
						<span>{{l("Next")}}</span>
					</a>
					<!-- <button *ngIf="!this.caseInvestigationOfficer.id" (click)="saveAndNew()" class="btn btn-primary blue float-right"
                        [buttonBusy]="saving" [busyText]="l('SavingWithThreeDot')"><i class="fa fa-save"></i> 
                        <span>{{l("SaveAndNew")}}</span>
                    </button> -->
				</div>

			</div>
		</div>
	</div>
</div>
