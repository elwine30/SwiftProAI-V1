<div [@routerTransition]>
    <createCaseInsurer></createCaseInsurer>
    <div [class]="containerClass">
        <div class="card card-custom gutter-b">
            <sub-header [title]="'WORKSHOP' | localize"></sub-header>

            <div class="card-body">
                <form #caseWorkshopForm="ngForm">
                    <div class="form-group row">
                        <div class="col-xl-6 mb-5">
                            <label class="form-label">{{ l('Workshop') }}</label>
                            <select
                                name="caseWorkshop.workshopId"
                                [(ngModel)]="caseWorkshop.workshopId"
                                class="form-select"
                                (ngModelChange)="updateWorkshopAddress($event)"
                                required
                            >
                                <option value="" disabled>{{ l('SelectAWorkshop') }}</option>
                                <option *ngFor="let item of allWorkshops" value="{{ item.id }}">
                                    {{ item.displayName }}
                                </option>
                            </select>
                        </div>

                        <div class="col-xl-6">
                            <label class="form-label">{{ l('WorkshopAddress') }}</label>
                            <input
                                type="text"
                                #CaseInsurer_ReferenceNo="ngModel"
                                id="caseWorkshopAddress"
                                class="form-control"
                                [(ngModel)]="caseWorkshopAddress"
                                name="caseWorkshopAddress"
                                disabled
                            />
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-6 mb-5">
                            <label class="form-label">{{ l('ContactName') }}</label>
                            <input
                                type="text"
                                #CaseWorkshop_ContactName="ngModel"
                                id="CaseWorkshop_ContactName"
                                class="form-control"
                                [(ngModel)]="caseWorkshop.contactName"
                                name="ContactName"
                            />
                            <validation-messages [formCtrl]="CaseWorkshop_ContactName"></validation-messages>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-6 mb-5">
                            <label class="form-label">Contact Email</label>
                            <input
                                type="text"
                                #CaseWorkshop_Email="ngModel"
                                id="CaseWorkshop_Email"
                                class="form-control"
                                [(ngModel)]="caseWorkshop.email"
                                name="Email"
                            />
                            <validation-messages [formCtrl]="CaseWorkshop_Email"></validation-messages>
                        </div>

                        <div class="col-xl-6">
                            <label class="form-label">{{ l('ContactNo') }}</label>
                            <input
                                type="text"
                                #CaseWorkshop_ContactNo="ngModel"
                                id="CaseWorkshop_ContactNo"
                                class="form-control"
                                [(ngModel)]="caseWorkshop.contactNo"
                                name="ContactNo"
                                onlyNumber
                            />
                            <validation-messages [formCtrl]="CaseWorkshop_ContactNo"></validation-messages>
                        </div>
                    </div>
                </form>
            </div>
            <div class="card-footer">
                <div class="col-lg-12" style="text-align: right">
                    <a
                        [routerLink]="[navigationService.step3Url]"
                        [queryParams]="{ id: caseWorkshop.registerId, stepId: 3 }"
                        class="btn btn-primary green float-right"
                    >
                        <i class="fa fa-arrow-left"></i>
                        <span>{{ l('Back') }}</span>
                    </a>
                    <button
                        (click)="save()"
                        class="btn btn-primary blue float-right"
                        [buttonBusy]="saving"
                        [busyText]="l('SavingWithThreeDot')"
                        [hidden]="isHidden"
                    >
                        <i class="fa fa-save"></i>
                        <span>{{ l('Save') }}</span>
                    </button>

                    <a
                        [routerLink]="[navigationService.step5Url]"
                        [queryParams]="{ id: caseWorkshop.registerId, stepId: 5 }"
                        class="btn btn-primary green float-right"
                    >
                        <i class="fa fa-arrow-right"></i>
                        <span>{{ l('Next') }}</span>
                    </a>
                    <!-- <button (click)="next()" class="btn btn-primary green float-right"><i
                        class=" fa fa-arrow-right"></i>
                    <span>{{l("Next")}}</span>
                    </button> -->
                </div>
            </div>
        </div>
    </div>
</div>
