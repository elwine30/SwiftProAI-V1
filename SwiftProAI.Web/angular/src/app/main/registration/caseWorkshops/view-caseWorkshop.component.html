<div [@routerTransition]>
    <div [class]="containerClass">
        <div class="card card-custom gutter-b">
            <sub-header [title]="'WORKSHOP' | localize"></sub-header>

            <div class="card-body">
                <div class="row">
                    <div class="col-3 mb-3">
                        <h6 class="font-weight-bold">{{ l('Workshop') }} :</h6>
                    </div>
                    <div class="col-3 mb-3">
                        <span>{{ caseWorkshopName }}</span>
                    </div>

                    <div class="col-3 mb-3">
                        <h6 class="font-weight-bold">{{ l('Workshop Address') }} :</h6>
                    </div>
                    <div class="col-3 mb-3">
                        <span>{{ caseWorkshopAddress }}</span>
                    </div>

                    <div class="col-3 mb-3">
                        <h6 class="font-weight-bold">{{ l('Contact Name') }} :</h6>
                    </div>
                    <div class="col-3 mb-3">
                        <span>{{ item.contactName }}</span>
                    </div>

                    <div class="col-3 mb-3">
                        <h6 class="font-weight-bold">{{ l('Email') }} :</h6>
                    </div>
                    <div class="col-3 mb-3">
                        <span>{{ item.email }}</span>
                    </div>
                    
                    <div class="col-3 mb-3">
                        <h6 class="font-weight-bold">{{ l('Contact No') }} :</h6>
                    </div>
                    <div class="col-3 mb-3">
                        <span>{{ item.contactNo }}</span>
                    </div>
                </div>
            </div>
            <div class="card-footer">
                <div class="col-lg-12" style="text-align: right">
                    <a
                        [routerLink]="[navigationService.step3Url]"
                        [queryParams]="{ id: item.registerId, stepId: 3 }"
                        class="btn btn-primary green float-right"
                    >
                        <i class="fa fa-arrow-left"></i>
                        <span>{{ l('Back') }}</span>
                    </a>

                    <a
                        [routerLink]="[navigationService.step5Url]"
                        [queryParams]="{ id: item.registerId, stepId: 5 }"
                        class="btn btn-primary green float-right"
                    >
                        <i class="fa fa-arrow-right"></i>
                        <span>{{ l('Next') }}</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
