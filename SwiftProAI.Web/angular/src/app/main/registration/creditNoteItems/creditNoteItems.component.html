<div class="row align-items-center">
    <!--<Primeng-Datatable-Start>-->

    <p-table #dataTable (onLazyLoad)="getCreditNoteItems($event)" [value]="primengTableHelper.records"
        rows="{{primengTableHelper.defaultRecordsCountPerPage}}" [paginator]="false" [lazy]="true" [scrollable]="true"
        ScrollWidth="100%" [tableStyle]="{'min-width': '50rem'}"
        [resizableColumns]="primengTableHelper.resizableColumns">
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 150px" pSortableColumn="remark">
                    {{l('Remark')}}
                    <p-sortIcon field="creditNoteItem.remark"></p-sortIcon>
                </th>
                <th style="width: 150px" pSortableColumn="amount">
                    {{l('Amount')}}
                    <p-sortIcon field="creditNoteItem.amount"></p-sortIcon>
                </th>
                <th style="width: 100px"
                    [hidden]="!isGrantedAny('Pages.CreditNoteItems.Edit', 'Pages.CreditNoteItems.Delete')">
                    {{l('Actions')}}</th>

            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-record="$implicit" let-i="rowIndex">
            <tr>
                <td style="width:100px">
                    <span class="p-column-title"> {{l('Remark')}}</span>
                    {{record.creditNoteItem.remark}}
                </td>
                <td style="width:50px">
                    <span class="p-column-title"> {{l('Amount')}}</span>
                    {{record.creditNoteItem.amount | number: '1.2-2'}}
                </td>

                <td style="width: 50px"
                    [hidden]="!isGrantedAny('Pages.CreditNoteItems.Edit', 'Pages.CreditNoteItems.Delete')">
                    <div class="btn-group" role="group">
                        <button type="button" class="btn btn-sm btn-link"
                            *ngIf="permission.isGranted('Pages.CreditNoteItems.Edit')"
                            (click)="createOrEditCreditNoteItemModal.show(null,record.creditNoteItem.id)">
                            <i class="fa fa-pencil-alt" style="margin-right: 20px;"></i>
                        </button>
                        <button type="button" class="btn btn-sm btn-link"
                            *ngIf="permission.isGranted('Pages.CreditNoteItems.Delete')"
                            (click)="deleteCreditNoteItem(record.creditNoteItem)">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>

        </ng-template>
    </p-table>
    <div class="primeng-no-data" *ngIf="primengTableHelper.totalRecordsCount == 0">
        {{l('NoData')}}
    </div>
    <div class="primeng-paging-container" hidden>
        <p-paginator [rows]="primengTableHelper.defaultRecordsCountPerPage" #paginator
            (onPageChange)="getCreditNoteItems($event)" [totalRecords]="primengTableHelper.totalRecordsCount"
            [rowsPerPageOptions]="primengTableHelper.predefinedRecordsCountPerPage" [showCurrentPageReport]="true"
            [currentPageReportTemplate]="'TotalRecordsCount' | localize:primengTableHelper.totalRecordsCount">
        </p-paginator>
    </div>

    <!--<Primeng-Datatable-End>-->
</div>

<createOrEditCreditNoteItemModal #createOrEditCreditNoteItemModal (modalSave)="emitTableChange()">
</createOrEditCreditNoteItemModal>
