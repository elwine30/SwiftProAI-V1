<div [@routerTransition]>
  
  
  <sub-header [title]="('CasePoliceReportSummaries' | localize) +' '+ ('Details' | localize)" [breadcrumbs]="breadcrumbs">
            </sub-header>
            
    
    <div [class]="containerClass">
        <div class="card card-custom gutter-b">
            <div class="card-body">              
                
                
                
								<div class="my-3">
									<label class="form-label" for="CasePoliceReportSummary_RegisterId">{{l("RegisterId")}}</label>
									<input type="number" #CasePoliceReportSummary_RegisterId="ngModel" id="CasePoliceReportSummary_RegisterId" class="form-control" [(ngModel)]="casePoliceReportSummary.registerId" name="RegisterId"   />
								    <validation-messages [formCtrl]="CasePoliceReportSummary_RegisterId"></validation-messages>
								</div>
					
								<div class="form-group">
									<label for="CasePoliceReportSummary_ReportSummary">{{l("ReportSummary")}}</label>
									<input type="text" #CasePoliceReportSummary_ReportSummary="ngModel" id="CasePoliceReportSummary_ReportSummary" class="form-control" [(ngModel)]="casePoliceReportSummary.reportSummary" name="ReportSummary"   minlength="0"  maxlength="2000" />
								    <validation-messages [formCtrl]="CasePoliceReportSummary_ReportSummary"></validation-messages>
								</div>
					
								<div class="form-group">
									<label for="CasePoliceReportSummary_ReportInconsistency">{{l("ReportInconsistency")}}</label>
									<input type="text" #CasePoliceReportSummary_ReportInconsistency="ngModel" id="CasePoliceReportSummary_ReportInconsistency" class="form-control" [(ngModel)]="casePoliceReportSummary.reportInconsistency" name="ReportInconsistency"    />
								    <validation-messages [formCtrl]="CasePoliceReportSummary_ReportInconsistency"></validation-messages>
								</div>
					
            </div>
              <div class="card-footer">
				<div class="col-lg-12">
					<button (click)="save()" class="btn btn-primary blue float-right"
                        [buttonBusy]="saving" [busyText]="l('SavingWithThreeDot')"><i class="fa fa-save"></i> 
                        <span>{{l("Save")}}</span>
                    </button>
                    <button *ngIf="!this.casePoliceReportSummary.id" (click)="saveAndNew()" class="btn btn-primary blue float-right"
                        [buttonBusy]="saving" [busyText]="l('SavingWithThreeDot')"><i class="fa fa-save"></i> 
                        <span>{{l("SaveAndNew")}}</span>
                    </button>
				</div>
		    </div>
        </div>
    </div>
  </div>
