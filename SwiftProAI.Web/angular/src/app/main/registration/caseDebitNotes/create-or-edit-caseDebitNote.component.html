<div [@routerTransition]>
    <div [class]="containerClass">
        <div class="card card-custom gutter-b">
            <sub-header [title]="'DebitNoteGenerator' | localize"></sub-header>

            <form #caseDebitNoteForm="ngForm">
                <div class="card-body">
                    <div class="row mb-2">
                        <div class="col-xl-10 text-center">
                            <h2>{{ tenantCompanyName }}</h2>
                        </div>
                        <!-- <div class="col-md-6 text-md-right">
						  <h3>(Company No: {{ companyNumber }})</h3>
					  </div> -->
                    </div>

                    <div class="row mb-5">
                        <!-- <div class="col-xl-12">
						  <p>File Reference: {{ fileReference }}</p>
					  </div> -->
                        <!-- <div class="col-xl-10 text-center">
						<h4>Date: &lt;{{l("DebitNoteGeneratedDate")}}&gt; </h4>
					</div> -->
                    </div>
                </div>

                <div class="card-body">
                    <div class="form-group row">
                        <div class="col-xl-7">
                            <h5 class="card-title bg-light p-2 text-center">{{ l('Item') }}</h5>
                        </div>
                        <div class="col-xl-2">
                            <h5 class="card-title bg-light p-2 text-center">{{ l('Amount') }}</h5>
                        </div>
                        <div class="col-xl-2">
                            <h5 class="card-title bg-light p-2 text-center">{{ l('SST') }}</h5>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-5 mb-5"></div>

                        <div class="col-xl-2"></div>

                        <div class="col-xl-2 mb-5"></div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-5 mb-5">
                            <label class="form-label" for="CaseDebitNote_ServiceRemark">{{ l('Service') }}</label>
                            <input
                                type="text"
                                #CaseDebitNote_ServiceRemark="ngModel"
                                id="CaseDebitNote_ServiceRemark"
                                class="form-control"
                                [(ngModel)]="caseDebitNote.serviceRemark"
                                name="ServiceRemark"
                                minlength="1"
                                maxlength="100"
                                placeholder="Type a Remark"
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_ServiceRemark"></validation-messages>
                        </div>

                        <div class="col-xl-2"></div>

                        <div class="col-xl-2 mb-5">
                            <label class="form-label" for="CaseDebitNote_ServiceAmount">{{ l('ServiceAmount') }}</label>
                            <input
                                type="number"
                                #CaseDebitNote_ServiceAmount="ngModel"
                                id="CaseDebitNote_ServiceAmount"
                                class="form-control"
                                [(ngModel)]="caseDebitNote.serviceAmount"
                                name="ServiceAmount"
                                (change)="onItemAmountChange({ amount: 'serviceAmount', sst: 'serviceSST' })"
                                style="text-align: right"
                                step="0.01"
                                amount
                                decimal
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_ServiceAmount"></validation-messages>
                        </div>

                        <div class="col-xl-2 mb-5">
                            <div class="col-xl-12 d-flex justify-content-between">
                                <label class="form-label" for="CaseDebitNote_ServiceSST">{{ l('ServiceSST') }}</label>
                                <input
                                    type="checkbox"
                                    [(ngModel)]="sstCheckboxStates['serviceSST']"
                                    name="sstCheckboxStates['serviceSST']"
                                    (ngModelChange)="onItemAmountChange({ amount: 'serviceAmount', sst: 'serviceSST' })"
                                    [checked]="sstCheckboxStates['serviceSST']"
                                    style="margin-right: 3px"
                                />
                            </div>
                            <input
                                type="number"
                                #CaseDebitNote_ServiceSST="ngModel"
                                id="CaseDebitNote_ServiceSST"
                                class="form-control"
                                [ngModel]="formatNumber(caseDebitNote.serviceSST)"
                                name="ServiceSST"
                                step="0.01"
                                style="text-align: right"
                                disabled
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_ServiceSST"></validation-messages>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-3 mb-5">

                                step="0.001"
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_MileageKM"></validation-messages>
                        </div>

                        <div class="col-xl-2">

                                class="form-control"
                                [ngModel]="formatNumber(caseDebitNote.accommodationSST)"
                                name="AccommodationSST"
                                style="text-align: right"
                                step="0.01"
                                disabled
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_AccommodationSST"></validation-messages>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="form-group row">
                        <div class="col-xl-5 d-flex justify-content-between">
                            <label class="form-label" for="CaseDebitNote_MiscAmount">{{ l('Miscellaneous') }}</label>
                            <label
                                id="btn_create_debitNoteItem"
                                *ngIf="
                                    isGranted('Pages.DebitNoteItems.Create') ||
                                    (isGranted('Pages.DebitNoteItems.Create.Adjuster') &&
                                        isGranted('Pages.DebitNoteItems.Create.Admin'))
                                "
                                (click)="
                                    createDebitNoteItem(createOrEditDebitNoteItemModalMiscellaneous, 'Miscellaneous')
                                "
                                class="form-label"
                                style="cursor: pointer; color: rgb(13, 110, 253); margin-right: 15px"
                            >
                                <i class="fa fa-plus" style="color: rgb(13, 110, 253); margin-right: 5px"></i>
                                {{ l('AddMiscellaneousFee') }}
                            </label>
                        </div>

                        <div class="col-xl-2"></div>

                        <div class="col-xl-2">
                            <label class="form-label" for="CaseDebitNote_MiscAmount">{{ l('MiscAmount') }}</label>
                        </div>

                        <div class="col-xl-2">
                            <div class="col-xl-12 d-flex justify-content-between">
                                <label class="form-label" for="CaseDebitNote_MiscSST">{{ l('MiscSST') }}</label>
                                <input
                                    type="checkbox"
                                    [(ngModel)]="sstCheckboxStates['miscSST']"
                                    name="sstCheckboxStates['miscSST']"
                                    (ngModelChange)="onItemAmountChange({ amount: 'miscAmount', sst: 'miscSST' })"
                                    [checked]="sstCheckboxStates['miscSST']"
                                    style="margin-right: 3px"
                                />
                            </div>
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-6 mb-5">
                            <debitNoteItemsTable
                                #debitNoteItemsTableMiscellaneous
                                [itemType]="'Miscellaneous'"
                                (tableChange)="updateDebitNoteItemTotal()"
                            ></debitNoteItemsTable>
                        </div>

                        <div class="col-xl-1"></div>

                        <div class="col-xl-2 mb-5">
                            <input
                                type="number"
                                #CaseDebitNote_MiscAmount="ngModel"
                                id="CaseDebitNote_MiscAmount"
                                class="form-control"
                                [ngModel]="formatNumber(caseDebitNote.miscAmount)"
                                name="MiscAmount"
                                (change)="onItemAmountChange({ amount: 'miscAmount', sst: 'miscSST' })"
                                style="text-align: right"
                                step="0.01"
                                amount
                                disabled
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_MiscAmount"></validation-messages>
                        </div>

                        <div class="col-xl-2 mb-5">
                            <input
                                type="number"
                                #CaseDebitNote_MiscSST="ngModel"
                                id="CaseDebitNote_MiscSST"
                                class="form-control"
                                [ngModel]="formatNumber(caseDebitNote.miscSST)"
                                name="MiscSST"
                                pattern="0.01"
                                disabled
                                style="text-align: right"
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_MiscSST"></validation-messages>
                        </div>
                    </div>
                </div>

                <div class="form-group"></div>

                <div class="my-3"></div>

                <div class="card-footer">
                    <div class="form-group row">
                        <div class="col-xl-5 mb-5">
                            <label class="form-label">{{ l('Subtotal:') }}</label>
                        </div>

                        <div class="col-xl-2"></div>

                        <div class="col-xl-2 mb-5">
                            <label class="form-label" for="CaseDebitNote_AmountExcludeSST">
                                {{ l('AmountExcludeSST') }}
                            </label>
                            <input
                                type="number"
                                #CaseDebitNote_AmountExcludeSST="ngModel"
                                id="CaseDebitNote_AmountExcludeSST"
                                class="form-control"
                                [ngModel]="formatNumber(caseDebitNote.amountExcludeSST)"
                                name="AmountExcludeSST"
                                style="text-align: right"
                                step="0.01"
                                readonly
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_AmountExcludeSST"></validation-messages>
                        </div>

                        <div class="col-xl-2 mb-5">
                            <label class="form-label" for="sstAmount">{{ l('SSTAmount') }}</label>
                            <input
                                type="number"
                                #SstAmount="ngModel"
                                id="SstAmount"
                                class="form-control"
                                [ngModel]="formatNumber(this.sstAmount)"
                                name="sstAmount"
                                style="text-align: right"
                                step="0.01"
                                readonly
                            />
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-5 mb-5">
                            <label class="form-label" for="SstAmount">{{ l('IncludeSSTRateAmount') }}</label>
                            <input
                                type="checkbox"
                                #CaseDebitNote_IncludeSST="ngModel"
                                id="CaseDebitNote_IncludeSST"
                                name="includeSST"
                                [(ngModel)]="caseDebitNote.includeSST"
                                (change)="toggleSST($event)"
                                checked
                                style="text-align: right; margin-left: 25px"
                            />
                        </div>

                        <div class="col-xl-2"></div>

                        <div class="col-xl-2 mb-5"></div>

                        <div class="col-xl-2 mb-5"></div>
                    </div>

                    <div class="form-group row">
                        <div class="col-xl-5 mb-5">
                            <label class="form-label" for="CaseDebitNote_TotalInTextForm">
                                {{ l('TotalInTextForm') }}
                            </label>
                            <input
                                type="text-field"
                                #CaseDebitNote_TotalInTextForm="ngModel"
                                id="CaseDebitNote_TotalInTextForm"
                                class="form-control"
                                [(ngModel)]="caseDebitNote.totalInTextForm"
                                name="TotalInTextForm"
                                readonly
                            />
                            <validation-messages [formCtrl]="CaseDebitNote_TotalInTextForm"></validation-messages>
                        </div>

                        <div class="col-xl-2"></div>

                        <div class="col-xl-4 mb-5">
                            <label class="form-label" for="CaseDebitNote_TotalAmount">{{ l('TotalAmount') }}</label>
                            <div class="input-group">
                                <input
                                    type="number"
                                    #CaseDebitNote_TotalAmount="ngModel"
                                    id="CaseDebitNote_TotalAmount"
                                    class="form-control"
                                    [ngModel]="formatNumber(caseDebitNote.totalAmount)"
                                    name="TotalAmount"
                                    step="0.01"
                                    style="text-align: right"
                                    readonly
                                />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card-footer">
                    <div class="form-group row">
                        <div class="col-xl-8 mb-5"></div>

                        <div class="col-xl-3 d-flex justify-content-end">
                            <button (click)="goBack()" class="btn btn-light-primary fw-bold flex-grow-1">
                                <span>{{ l('Back') }}</span>
                            </button>
                            <button
                                (click)="save()"
                                class="btn btn-primary blue float-right"
                                [buttonBusy]="saving"
                                [busyText]="l('SavingWithThreeDot')"
                            >
                                <i class="fa fa-save"></i>
                                <span>{{ l('Save') }}</span>
                            </button>
                            <button
                                (click)="preview()"
                                class="btn btn-success blue float-right flex-grow-1"
                                [buttonBusy]="saving"
                                [busyText]="l('SavingWithThreeDot')"
                            >
                                <i class="fa fa-paper-plane"></i>
                                <span>{{ l('Preview') }}</span>
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <createOrEditDebitNoteItemModal
        #createOrEditDebitNoteItemModalThirdParty
        (modalSave)="debitNoteItemsTableThirdParty.getDebitNoteItems(); updateDebitNoteItemTotal()"
    ></createOrEditDebitNoteItemModal>
    <createOrEditDebitNoteItemModal
        #createOrEditDebitNoteItemModalSearchFee
        (modalSave)="debitNoteItemsTableSearchFee.getDebitNoteItems(); updateDebitNoteItemTotal()"
    ></createOrEditDebitNoteItemModal>
    <createOrEditDebitNoteItemModal
        #createOrEditDebitNoteItemModalAirFare
        (modalSave)="debitNoteItemsTableAirFare.getDebitNoteItems(); updateDebitNoteItemTotal()"
    ></createOrEditDebitNoteItemModal>
    <createOrEditDebitNoteItemModal
        #createOrEditDebitNoteItemModalCharteredTransport
        (modalSave)="debitNoteItemsTableCharteredTransport.getDebitNoteItems(); this.updateDebitNoteItemTotal()"
    ></createOrEditDebitNoteItemModal>
    <createOrEditDebitNoteItemModal
        #createOrEditDebitNoteItemModalTaxiFare
        (modalSave)="debitNoteItemsTableTaxiFare.getDebitNoteItems(); updateDebitNoteItemTotal()"
    ></createOrEditDebitNoteItemModal>
    <createOrEditDebitNoteItemModal
        #createOrEditDebitNoteItemModalAccommodation
        (modalSave)="debitNoteItemsTableAccommodation.getDebitNoteItems(); updateDebitNoteItemTotal()"
    ></createOrEditDebitNoteItemModal>
    <createOrEditDebitNoteItemModal
        #createOrEditDebitNoteItemModalMiscellaneous
        (modalSave)="debitNoteItemsTableMiscellaneous.getDebitNoteItems(); updateDebitNoteItemTotal()"
    ></createOrEditDebitNoteItemModal>
</div>
