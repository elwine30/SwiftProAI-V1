<div
    appBsModal
    #createModal="bs-modal"
    (onShown)="onShown()"
    class="modal fade"
    tabindex="-1"
    role="dialog"
    aria-labelledby="createModal"
    aria-hidden="true"
    [config]="{ backdrop: 'static', keyboard: !saving }"
>
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form
                #remarkCreateForm="ngForm"
                role="form"
                novalidate
                class="form-validation"
                (ngSubmit)="save()"
            >
                <div class="modal-header">
                    <h5 class="modal-title">
                        <span>{{ 'REMARKS' | localize }}</span>
                    </h5>
                    <button
                        type="button"
                        class="btn-close"
                        (click)="close()"
                        [attr.aria-label]="l('Close')"
                        [disabled]="saving"
                    >
                    </button>
                </div>

                <div class="modal-body">
                    <div class="mb-5">
                        <label class="form-label required" for="remarkDescription">{{ 'Remarks' | localize }}</label>
                        <div class="col-lg-12 col-md-12 col-sm-12">
                            <textarea
                            class="form-control"
                            id="remarkDescription"
                            name="remarkDescription"
                            rows="5"
                            [(ngModel)]="remarkDetails.description"
                            ></textarea>
                        </div>
                        <div class="col-lg-12 col-md-12 col-sm-12 mt-5" style="display: flex; justify-content: end;">
                            <button
                                type="submit"
                                [buttonBusy]="saving"
                                [busyText]="l('SavingWithThreeDot')"
                                class="btn btn-primary fw-bold"
                                [disabled]="!remarkCreateForm.form.valid || saving"
                            >
                                <i class="fa fa-save"></i>
                                <span>{{ 'Save' | localize }}</span>
                            </button>
                        </div>
                    </div>

                    <div class="row align-items-center">
                        <!--<Primeng-TurboTable-Start>-->
                        <div class="col primeng-datatable-container" [busyIf]="primengTableHelper.isLoading">
                            <p-table #dataTable sortMode="single"
                            (onLazyLoad)="getRemarkDetails($event)"
                                [value]="primengTableHelper.records"
                                rows="{{ primengTableHelper.defaultRecordsCountPerPage }}" [paginator]="false" [lazy]="true"
                                [tableStyle]="{ 'min-width': '50rem' }">
                                <ng-template pTemplate="header">
                                    <tr>
                                        <th style="width: 60%;">
                                            {{ 'Remarks' | localize }}
                                        </th>
                                        <th style="width: 20%;">
                                            {{ 'Created By' | localize }}
                                        </th>
                                        <th style="width: 20%;">
                                            {{ 'Created Date' | localize }}
                                        </th>
                                    </tr>
                                </ng-template>
                                <ng-template pTemplate="body" let-record="$implicit">
                                    <tr>
                                        <td>{{ record.description }}</td>
                                        <td>{{ record.creatorUserName }}</td>
                                        <td>{{ record.creationTime | date: 'dd-MM-YYYY HH:mm:ss' }}</td>
                                        <!-- <td>{{ record.statusCode }}</td> -->
                                    </tr>
                                </ng-template>
                            </p-table>
                            <div class="primeng-no-data" *ngIf="primengTableHelper.totalRecordsCount == 0">
                                {{ 'No Remarks' | localize }}
                            </div>
                            <div class="primeng-paging-container">
                                <p-paginator [rows]="primengTableHelper.defaultRecordsCountPerPage" #paginator
                                    (onPageChange)="getRemarkDetails($event)"
                                    [totalRecords]="primengTableHelper.totalRecordsCount"
                                    [rowsPerPageOptions]="primengTableHelper.predefinedRecordsCountPerPage"
                                    [showCurrentPageReport]="true" [currentPageReportTemplate]="
                                        'TotalRecordsCount' | localize: primengTableHelper.totalRecordsCount
                                    "></p-paginator>
                            </div>
                        </div>
                        <!--<Primeng-TurboTable-End>-->
                    </div>
                </div>
                <div class="modal-footer">
                    <button
                        type="button"
                        [disabled]="saving"
                        class="btn btn-light-primary fw-bold"
                        (click)="close()"
                    >
                        {{ 'Back' | localize }}
                    </button>
                </div>
            </form>


        </div>
    </div>
</div>
