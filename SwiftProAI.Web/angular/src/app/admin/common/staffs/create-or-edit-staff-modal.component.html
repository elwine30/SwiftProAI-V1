
	<div class="my-3">
		<label class="form-label" for="GroupName">{{l("Group")}}</label>
		<select name="staff.groupId" [(ngModel)]="staff.groupId" class="form-select" required>
			<option *ngFor="let item of allGroups" value="{{item.id}}">{{item.displayName}}</option>
		</select>
	</div>
		
	<div class="my-3">
		<label class="form-label" for="Staff_NRIC">{{l("NRIC")}}</label>
		<input type="text" #Staff_NRIC="ngModel" id="Staff_NRIC" class="form-control" [(ngModel)]="staff.nric" name="NRIC"   minlength="0"  maxlength="20" />
		<validation-messages [formCtrl]="Staff_NRIC"></validation-messages>
	</div>

	<div class="my-3">
		<label class="form-label" for="Staff_Address">{{l("Address")}}</label>
		<input type="text" #Staff_Address="ngModel" id="Staff_Address" class="form-control" [(ngModel)]="staff.address" name="Address"   minlength="0"  maxlength="100" />
		<validation-messages [formCtrl]="Staff_Address"></validation-messages>
	</div>

	<div class="my-3">
		<label class="form-label" for="Staff_Passport">{{l("Passport")}}</label>
		<input type="text" #Staff_Passport="ngModel" id="Staff_Passport" class="form-control" [(ngModel)]="staff.passport" name="Passport"   minlength="0"  maxlength="50" />
		<validation-messages [formCtrl]="Staff_Passport"></validation-messages>
	</div>

	<div class="my5">
		<label class="form-label" for="Staff_ServiceFeePercent">{{l("ServiceFeePercent")}}</label>
		<input type="number" #Staff_ServiceFeePercent="ngModel" id="Staff_ServiceFeePercent" class="form-control" [(ngModel)]="staff.serviceFeePercent" name="ServiceFeePercent"  min="0"  max="100"  />
		<validation-messages [formCtrl]="Staff_ServiceFeePercent"></validation-messages>
	</div>

	<div class="my5">
		<label class="form-label" for="Staff_FraudFeePercent">{{l("FraudFeePercent")}}</label>
		<input type="number" #Staff_FraudFeePercent="ngModel" id="Staff_FraudFeePercent" class="form-control" [(ngModel)]="staff.fraudFeePercent" name="FraudFeePercent"  min="0"  max="100"  />
		<validation-messages [formCtrl]="Staff_FraudFeePercent"></validation-messages>
	</div>
